name: gpt-5-agentic-search-default-agent-advanced-react-prompt-bge-large-calculator-reranker
parallelism: 20

session_runner:
  max_steps: 10
  enable_logging: true

agent:
  model_name: gpt-5
  temperature: 1
  agent_name: default
  system_prompt_name: advanced_react_prompt
  tools:
    - search_pdf
    - calculator

semantic_retrieval:
  model_name: BAAI/bge-large-en-v1.5
  reranker_model_name: BAAI/bge-reranker-v2-m3
  chunk_size: 1024
  chunk_overlap: 200
